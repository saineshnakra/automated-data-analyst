name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check .
      - name: Test
        run: python -m unittest discover -s tests -v
      - name: Compile
        run: python -m compileall -q analysis.py ai_insights.py business_insights.py demo_data.py file_io.py pipeline.py ui.py app.py tests
